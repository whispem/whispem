<svg xmlns="http://www.w3.org/2000/svg" width="344" height="112" viewBox="0 0 344 112" role="img" aria-label="Hi! I’m Emilie (Em’)">
  <title>Hi! I’m Emilie (Em’) 👋🏼</title>
  <defs>
    <linearGradient id="imsg" x1="0" y1="18" x2="0" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#57A9FF"/>
      <stop offset="1" stop-color="#1D6FF2"/>
    </linearGradient>
  </defs>
  <style><![CDATA[
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    /* typing dots */
    .dot { animation: blink 1.1s ease-in-out infinite; }
    .d1 { animation-delay: -1.10s; }
    .d2 { animation-delay: -0.95s; }
    .d3 { animation-delay: -0.80s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: 0.35; transform: translateY(0); }
      30%           { opacity: 1;    transform: translateY(-3.5px); }
    }

    /* typing bubble disappears once "she hits send" */
    #typing { animation: vanish 2.2s linear forwards; }
    @keyframes vanish {
      0%, 86% { opacity: 1; }
      100%    { opacity: 0; }
    }

    /* the message springs in from the tail */
    #message {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: 92% 90%;
      animation: pop 0.5s cubic-bezier(0.22, 1.2, 0.32, 1) 2.1s forwards;
    }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.55); }
      75%  { opacity: 1; transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* iMessage wouldn't be iMessage without it */
    #delivered { opacity: 0; animation: rise 0.45s ease-out 2.85s forwards; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
      #typing { animation: none; opacity: 0; }
      #message, #delivered { animation: none; opacity: 1; }
    }
  ]]></style>

  <!-- typing indicator -->
  <g id="typing">
    <rect x="220" y="18" width="96" height="56" rx="28" fill="url(#imsg)"/>
    <path d="M303 46 C307 60 315 70 330 75 C316 78 304 74 296 65 Z" fill="url(#imsg)"/>
    <circle class="dot d1" cx="246" cy="46" r="5.5" fill="#FFFFFF"/>
    <circle class="dot d2" cx="268" cy="46" r="5.5" fill="#FFFFFF"/>
    <circle class="dot d3" cx="290" cy="46" r="5.5" fill="#FFFFFF"/>
  </g>

  <!-- the message -->
  <g id="message">
    <rect x="6" y="18" width="310" height="56" rx="28" fill="url(#imsg)"/>
    <path d="M303 46 C307 60 315 70 330 75 C316 78 304 74 296 65 Z" fill="url(#imsg)"/>
    <text x="161" y="54" text-anchor="middle" font-size="23" font-weight="600" fill="#FFFFFF">Hi! I’m Emilie (Em’) 👋🏼</text>
  </g>

  <!-- delivered -->
  <text id="delivered" x="316" y="96" text-anchor="end" font-size="12.5" font-weight="500" fill="#8E8E93">Delivered</text>
</svg>
